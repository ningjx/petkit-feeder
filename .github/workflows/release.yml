name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      force_release:
        description: '强制发布（即使版本未更新）'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      new_tag: ${{ steps.check.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version
        id: check
        run: |
          # 从 manifest.json 读取版本
          MANIFEST_VERSION=$(jq -r '.version' custom_components/petkit_feeder/manifest.json)
          echo "manifest_version=$MANIFEST_VERSION"

          # 获取最新 tag
          LATEST_TAG=$(git tag --sort=-v:refname | grep "^v" | head -1 || echo "v0.0.0")
          TAG_VERSION=${LATEST_TAG#v}
          echo "latest_tag=$LATEST_TAG"
          echo "tag_version=$TAG_VERSION"

          SHOULD_RELEASE="false"
          NEW_TAG=""

          # push 到 main 分支
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            if [[ "$MANIFEST_VERSION" > "$TAG_VERSION" ]]; then
              SHOULD_RELEASE="true"
              NEW_TAG="v${MANIFEST_VERSION}"
              echo "版本更新: $TAG_VERSION → $MANIFEST_VERSION，将创建新 tag"
            else
              echo "版本未更新 ($MANIFEST_VERSION ≤ $TAG_VERSION)，跳过发布"
            fi
          fi

          # push tag 触发
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            SHOULD_RELEASE="true"
            NEW_TAG="${{ github.ref_name }}"
            echo "tag 触发发布: $NEW_TAG"
          fi

          # 手动触发强制发布
          if [[ "${{ inputs.force_release }}" == "true" ]]; then
            SHOULD_RELEASE="true"
            NEW_TAG="v${MANIFEST_VERSION}"
            echo "手动触发强制发布: $NEW_TAG"
          fi

          echo "should_release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

  create-tag:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.check-version.outputs.new_tag }}"
          git push origin "${{ needs.check-version.outputs.new_tag }}"

  release:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create zip
        run: |
          cd custom_components/petkit_feeder
          zip -r ../../petkit_feeder.zip .
          cd ../..

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ needs.check-version.outputs.new_tag }}
          files: petkit_feeder.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}